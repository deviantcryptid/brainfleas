<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFleas</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="icon" href="icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icon-512.png" sizes="512x512">

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- SortableJS for drag-and-drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body data-theme="light">
    <header>
        <img src="icon-192.png" alt="BrainFleas Icon">
        <h1>BrainFleas</h1>
        <button id="theme-toggle">🌞</button>
    </header>

    <div id="input-row">
        <input type="text" id="shortcode-input" placeholder="Enter a PluralKit system ID (ex. abcde)">
        <button id="add-system-btn">Add System</button>
    </div>

    <div id="systems-container">
        <!-- System cards will be dynamically added here -->
    </div>

    <script src="app.js"></script>
</body>
</html>
